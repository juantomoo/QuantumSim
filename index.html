  [20,"Ca","Calcio","Calcium",40.078,1,"s",0,"[Ar] 4s2",1.00,2,4,"Metal gris plateado muy reactivo. Forma la base estructural de huesos, conchas y dientes en biología, y es indispensable en la producción de cemento.","Highly reactive silvery-gray metal. Forms the structural basis of bones, shells, and teeth in biology, and is indispensable in cement production."],
  [21,"Sc","Escandio","Scandium",44.956,2,"d",0,"[Ar] 3d1 4s2",1.36,3,4,"Metal de transición escaso y costoso de extraer. Se usa en aleaciones de aluminio-escandio para componentes aeroespaciales ligeros y equipamiento deportivo premium.","Rare transition metal, expensive to extract. Used in aluminum-scandium alloys for lightweight aerospace components and premium sports equipment."],
  [22,"Ti","Titanio","Titanium",47.867,2,"d",0,"[Ar] 3d2 4s2",1.54,4,4,"Famoso por tener la mayor proporción de resistencia-densidad de cualquier metal. Es altamente resistente a la corrosión química y biocompatible con el tejido óseo humano.","Famous for having the highest strength-to-density ratio of any metallic element. Highly chemically corrosion-resistant and biocompatible with human bone tissue."],
  [23,"V","Vanadio","Vanadium",50.942,2,"d",0,"[Ar] 3d3 4s2",1.63,5,4,"Metal dúctil y maleable de color grisáceo. Se utiliza casi exclusivamente como aditivo (ferrovanadio) para aumentar drásticamente la resistencia y dureza del acero.","Ductile and malleable grayish metal. Used almost exclusively as an additive (ferrovanadium) to drastically increase the strength and hardness of steel."],
  [24,"Cr","Cromo","Chromium",51.996,2,"d",0,"[Ar] 3d5 4s1",1.66,6,4,"Un metal brillante que resiste el deslustre. Es el aditivo esencial para fabricar acero inoxidable, previniendo su oxidación, y se emplea en el cromado de vehículos.","A lustrous metal that resists tarnishing. The essential additive to make stainless steel, preventing rust, and is widely used in vehicle chrome plating."],
  [25,"Mn","Manganeso","Manganese",54.938,2,"d",0,"[Ar] 3d5 4s2",1.55,7,4,"Metal duro, quebradizo y de aspecto plateado. Desempeña un papel estructural indispensable en la metalurgia del hierro para desoxidar y mejorar la durabilidad del acero.","Hard, brittle, silvery-looking metal. Plays an indispensable structural role in iron metallurgy to deoxidize and improve the durability of steel."],
  [26,"Fe","Hierro","Iron",55.845,2,"d",0,"[Ar] 3d6 4s2",1.83,8,4,"El metal más abundante de la Tierra por masa y componente central del núcleo terrestre. Es el pilar de la infraestructura civil y biológicamente vital en la hemoglobina.","The most abundant metal on Earth by mass and central component of Earth's core. The pillar of civil infrastructure and biologically vital in hemoglobin."],
  [27,"Co","Cobalto","Cobalt",58.933,2,"d",0,"[Ar] 3d7 4s2",1.88,9,4,"Metal magnético utilizado tradicionalmente para dar un color azul profundo al vidrio. Hoy es un material geoestratégico clave para baterías de iones de litio y superaleaciones.","Magnetic metal traditionally used to impart a deep blue color to glass. Today, a key geostrategic material for lithium-ion batteries and superalloys."],
  [28,"Ni","Níquel","Nickel",58.693,2,"d",0,"[Ar] 3d8 4s2",1.91,10,4,"Metal de transición versátil, magnético a temperatura ambiente. Valorado por su excelente resistencia a la corrosión, utilizado en monedas, blindajes y acero inoxidable.","Versatile transition metal, magnetic at room temperature. Valued for excellent corrosion resistance, used in coins, armor plating, and stainless steel."],
  [29,"Cu","Cobre","Copper",63.546,2,"d",0,"[Ar] 3d10 4s1",1.90,11,4,"Metal rojizo blando con una conductividad térmica y eléctrica excepcionalmente alta. Ha sido fundamental para el desarrollo humano, desde la Edad de Bronce hasta la electrónica actual.","Soft reddish metal with exceptionally high thermal and electrical conductivity. Fundamental to human development from the Bronze Age to modern electronics."],
  [30,"Zn","Zinc","Zinc",65.38,2,"d",0,"[Ar] 3d10 4s2",1.65,12,4,"Metal azulado-pálido que se utiliza masivamente en procesos de galvanización para proteger el hierro y acero contra la oxidación. También forma la aleación de latón junto al cobre.","Pale-bluish metal massively used in galvanization processes to protect iron and steel from rusting. Also forms the brass alloy alongside copper."],
  [31,"Ga","Galio","Gallium",69.723,3,"p",0,"[Ar] 3d10 4s2 4p1",1.81,13,4,"Posee un punto de fusión tan bajo (29.7°C) que puede derretirse al sostenerlo en la mano. Crucial en semiconductores (Arseniuro de Galio) para LEDs y microondas.","Has such a low melting point (29.7°C) that it melts when held in the hand. Crucial in semiconductors (Gallium Arsenide) for LEDs and microwaves."],
  [32,"Ge","Germanio","Germanium",72.630,4,"p",0,"[Ar] 3d10 4s2 4p2",2.01,14,4,"Un metaloide blanco grisáceo brillante. Fue el semiconductor original antes del silicio, fundamental en los primeros transistores y vital hoy en la fibra óptica.","A lustrous grayish-white metalloid. It was the original semiconductor before silicon, fundamental in early transistors and vital today in fiber optics."],
  [33,"As","Arsénico","Arsenic",74.922,4,"p",0,"[Ar] 3d10 4s2 4p3",2.18,15,4,"Metaloide gris, notorio históricamente por la extrema toxicidad de sus compuestos. Hoy en día se emplea en dopaje de semiconductores y preservación de madera.","Gray metalloid, historically notorious for the extreme toxicity of its compounds. Today, used in semiconductor doping and wood preservation."],
  [34,"Se","Selenio","Selenium",78.971,5,"p",0,"[Ar] 3d10 4s2 4p4",2.55,16,4,"No metal cuyas propiedades eléctricas responden drásticamente a la luz (fotoconductividad). Utilizado en fotocopiadoras, células fotoeléctricas y como suplemento dietético traza.","Nonmetal whose electrical properties respond drastically to light (photoconductivity). Used in photocopiers, photoelectric cells, and as a trace dietary supplement."],
  [35,"Br","Bromo","Bromine",79.904,6,"p",1,"[Ar] 3d10 4s2 4p5",2.96,17,4,"El único elemento no metálico que es líquido a temperatura ambiente. Es un fluido tóxico, de color rojo parduzco, utilizado en retardantes de llama y purificación química.","The only nonmetallic element that is liquid at room temperature. A toxic, brownish-red fluid used in flame retardants and chemical purification."],
  [36,"Kr","Criptón","Krypton",83.798,7,"p",2,"[Ar] 3d10 4s2 4p6",3.00,18,4,"Gas noble raro en la Tierra. Emite una luz blanca y brillante cuando se ioniza eléctricamente, lo que lo hace ideal para láseres de alta potencia y fotografía de alta velocidad.","Rare noble gas on Earth. Emits a bright white light when electrically ionized, making it ideal for high-power lasers and high-speed photography."],
  [37,"Rb","Rubidio","Rubidium",85.468,0,"s",0,"[Kr] 5s1",0.82,1,5,"Un metal alcalino increíblemente blando y reactivo que arde espontáneamente al contacto con el aire. Se usa en relojes atómicos y fotocélulas de alta precisión.","An incredibly soft and reactive alkali metal that burns spontaneously upon contact with air. Used in atomic clocks and high-precision photocells."],
  [38,"Sr","Estroncio","Strontium",87.62,1,"s",0,"[Kr] 5s2",0.95,2,5,"Metal blando altamente reactivo que imparte un color rojo carmesí brillante a las llamas. Es el ingrediente secreto detrás del color rojo vibrante en los fuegos artificiales.","Highly reactive soft metal that imparts a brilliant crimson red color to flames. It is the secret ingredient behind vibrant red colors in fireworks."],
  [39,"Y","Itrio","Yttrium",88.906,2,"d",0,"[Kr] 4d1 5s2",1.22,3,5,"Metal de transición casi siempre asociado con elementos de tierras raras. Crítico para la creación de fósforos rojos que daban color a las antiguas televisiones de tubo (CRT).","Transition metal almost always associated with rare-earth elements. Critical for creating the red phosphors that colored old CRT televisions."],
  [40,"Zr","Circonio","Zirconium",91.224,2,"d",0,"[Kr] 4d2 5s2",1.33,4,5,"Metal lustroso muy resistente al calor y a la corrosión. El óxido de circonio simulado (circonita) se usa ampliamente como una alternativa económica y brillante a los diamantes.","Lustrous metal highly resistant to heat and corrosion. Simulated zirconium oxide (cubic zirconia) is widely used as an affordable, brilliant diamond alternative."],
  [41,"Nb","Niobio","Niobium",92.906,2,"d",0,"[Kr] 4d4 5s1",1.6,5,5,"Metal superconductor y dúctil. Se alea con el acero para mejorar enormemente su fuerza a bajas temperaturas, utilizado en cohetes y maquinaria pesada.","Superconducting and ductile metal. Alloyed with steel to greatly improve its strength at low temperatures, used in rockets and heavy machinery."],
  [42,"Mo","Molibdeno","Molybdenum",95.95,2,"d",0,"[Kr] 4d5 5s1",2.16,6,5,"Posee uno de los puntos de fusión más altos de todos los elementos. Es una adición vital en el blindaje militar y herramientas de corte por su extrema resistencia térmica.","Possesses one of the highest melting points of all elements. A vital addition in military armor and cutting tools due to its extreme thermal resistance."],
  [43,"Tc","Tecnecio","Technetium",98,2,"d",0,"[Kr] 4d5 5s2",1.9,7,5,"Fue el primer elemento producido artificialmente en la historia. Al ser radiactivo y emitir rayos gamma detectables, es el isótopo médico más usado en diagnósticos por imagen.","The first artificially produced element in history. Being radioactive and emitting detectable gamma rays, it is the most used medical isotope in diagnostic imaging."],
  [44,"Ru","Rutenio","Ruthenium",101.07,2,"d",0,"[Kr] 4d7 5s1",2.2,8,5,"Un metal de transición raro de la familia del platino. Es extremadamente duro y se usa habitualmente para endurecer aleaciones eléctricas y hacer contactos resistentes al desgaste.","A rare transition metal of the platinum group. Extremely hard, it is regularly used to harden electrical alloys and create wear-resistant contacts."],
  [45,"Rh","Rodio","Rhodium",102.91,2,"d",0,"[Kr] 4d8 5s1",2.28,9,5,"Uno de los metales preciosos más raros y costosos del mundo. Su asombrosa capacidad catalítica lo hace insustituible en los convertidores catalíticos de automóviles.","One of the rarest and most expensive precious metals globally. Its astounding catalytic ability makes it irreplaceable in automobile catalytic converters."],
  [46,"Pd","Paladio","Palladium",106.42,2,"d",0,"[Kr] 4d10",2.20,10,5,"Metal brillante que tiene la notable capacidad de absorber hasta 900 veces su propio volumen en gas hidrógeno. Fundamental en tecnología de purificación de hidrógeno.","Lustrous metal with the remarkable ability to absorb up to 900 times its own volume in hydrogen gas. Fundamental in hydrogen purification technology."],
  [47,"Ag","Plata","Silver",107.87,2,"d",0,"[Kr] 4d10 5s1",1.93,11,5,"El metal con la conductividad eléctrica, térmica y óptica más alta del universo conocido. Históricamente valiosa, hoy es pilar de la industria electrónica y fotovoltaica.","The metal with the highest electrical, thermal, and optical conductivity in the known universe. Historically valuable, today a pillar of electronics and solar industries."],
  [48,"Cd","Cadmio","Cadmium",112.41,2,"d",0,"[Kr] 4d10 5s2",1.69,12,5,"Un metal blando y tóxico. Antes se usaba masivamente en pigmentos brillantes y baterías recargables Ni-Cd, uso que ha disminuido debido a sus severos riesgos ambientales.","A soft, toxic metal. Formerly used massively in bright pigments and Ni-Cd rechargeable batteries, usage has declined due to severe environmental risks."],
  [49,"In","Indio","Indium",114.82,3,"p",0,"[Kr] 4d10 5s2 5p1",1.78,13,5,"Un metal brillante tan blando que puedes cortarlo con un cuchillo o masticarlo. El óxido de indio y estaño (ITO) es la base transparente de todas las pantallas táctiles modernas.","A shiny metal so soft you can cut it with a knife or chew it. Indium tin oxide (ITO) is the transparent basis of all modern touchscreens."],
  [50,"Sn","Estaño","Tin",118.71,3,"p",0,"[Kr] 4d10 5s2 5p2",1.96,14,5,"Metal maleable que no se oxida fácilmente. Al alearse con el cobre formó el bronce, cambiando la historia humana. Hoy se usa para soldar componentes electrónicos.","Malleable metal that resists oxidation. Alloying with copper created bronze, changing human history. Today used extensively as electrical solder."],
  [51,"Sb","Antimonio","Antimony",121.76,4,"p",0,"[Kr] 4d10 5s2 5p3",2.05,15,5,"Un metaloide gris y quebradizo que paradójicamente se expande al congelarse. Es un compuesto clave en la fabricación de plásticos PET, microelectrónica y retardantes de fuego.","A brittle, gray metalloid that paradoxically expands upon freezing. A key compound in manufacturing PET plastics, microelectronics, and flame retardants."],
  [52,"Te","Telurio","Tellurium",127.60,4,"p",0,"[Kr] 4d10 5s2 5p4",2.1,16,5,"Un metaloide quebradizo extremadamente raro en la Tierra. Su aleación con cadmio crea paneles solares de película fina que absorben la luz solar con altísima eficiencia.","A brittle metalloid extremely rare on Earth. Its alloy with cadmium creates thin-film solar panels that absorb sunlight with very high efficiency."],
  [53,"I","Yodo","Iodine",126.90,6,"p",0,"[Kr] 4d10 5s2 5p5",2.66,17,5,"Sólido oscuro que sublima en un hermoso gas púrpura. Es el elemento esencial más pesado en biología, crucial para que la glándula tiroides regule el metabolismo humano.","Dark solid that sublimes into a beautiful purple gas. The heaviest essential element in biology, crucial for the thyroid gland to regulate human metabolism."],
  [54,"Xe","Xenón","Xenon",131.29,7,"p",2,"[Kr] 4d10 5s2 5p6",2.6,18,5,"Gas noble inodoro y denso. Genera un intenso destello de luz al ser excitado eléctricamente, impulsando lámparas de flash estroboscópico, faros de automóviles y propulsores iónicos.","Dense, odorless noble gas. Generates an intense flash of light when electrically excited, driving strobe flashes, car headlights, and deep-space ion thrusters."],
  [55,"Cs","Cesio","Caesium",132.91,0,"s",0,"[Xe] 6s1",0.79,1,6,"Metal dorado increíblemente reactivo que explota violentamente en agua. Su isótopo natural dicta el estándar universal del tiempo en los relojes atómicos mundiales.","Incredibly reactive golden metal that explodes violently in water. Its natural isotope dictates the universal standard of time in global atomic clocks."],
  [56,"Ba","Bario","Barium",137.33,1,"s",0,"[Xe] 6s2",0.89,2,6,"Metal denso y altamente reactivo. El sulfato de bario, al ser opaco a los rayos X, se ingiere temporalmente como líquido de contraste para examinar el tracto digestivo humano.","Dense, highly reactive metal. Barium sulfate, being opaque to X-rays, is swallowed temporarily as a contrast liquid to examine the human digestive tract."],
  [57,"La","Lantano","Lanthanum",138.91,8,"f",0,"[Xe] 5d1 6s2",1.1,3,6,"Metal blanco plateado tan blando que puede cortarse con un cuchillo. Da nombre a la serie de los lantánidos y mejora drásticamente el índice de refracción en lentes de cámaras profesionales.","Silvery-white metal soft enough to be cut with a knife. Names the lanthanide series and drastically improves the refractive index in professional camera lenses."],
  [58,"Ce","Cerio","Cerium",140.12,8,"f",0,"[Xe] 4f1 5d1 6s2",1.12,0,8,"Es el metal de tierras raras más abundante en la corteza terrestre. Emite chispas al ser golpeado, siendo el componente principal en las piedras de los encendedores modernos.","The most abundant rare-earth metal in Earth's crust. Emits sparks when struck, making it the primary component in modern lighter flints."],
  [59,"Pr","Praseodimio","Praseodymium",140.91,8,"f",0,"[Xe] 4f3 6s2",1.13,0,8,"Un lantánido blando que reacciona lentamente con el oxígeno. Utilizado para crear imanes de alta potencia y filtros de vidrio especializados para máscaras de soldadura (bloqueando luz IR).","A soft lanthanide that slowly reacts with oxygen. Used to create high-power magnets and specialized glass filters for welder's goggles (blocking IR light)."],
  [60,"Nd","Neodimio","Neodymium",144.24,8,"f",0,"[Xe] 4f4 6s2",1.14,0,8,"Famoso mundialmente por ser la base de los imanes permanentes más fuertes conocidos. Estos imanes impulsan motores de vehículos eléctricos, discos duros y turbinas eólicas.","Globally famous for forming the base of the strongest known permanent magnets. These magnets drive EV motors, computer hard drives, and wind turbines."],
  [61,"Pm","Prometio","Promethium",145,8,"f",0,"[Xe] 4f5 6s2",1.13,0,8,"Es el único lantánido radiactivo sin isótopos estables. Rara vez se encuentra en la naturaleza; se usa en recubrimientos luminosos y como fuente de energía en baterías de larga duración.","The only radioactive lanthanide with no stable isotopes. Rarely found in nature; used in luminous paints and as a power source in long-lasting atomic batteries."],
  [62,"Sm","Samario","Samarium",150.36,8,"f",0,"[Xe] 4f6 6s2",1.17,0,8,"Metal plateado de tierras raras. Las aleaciones de samario-cobalto generan imanes excepcionalmente permanentes que pueden operar a altísimas temperaturas sin perder su magnetismo.","Silvery rare-earth metal. Samarium-cobalt alloys create exceptionally permanent magnets that can operate at extreme temperatures without losing magnetism."],
  [63,"Eu","Europio","Europium",151.96,8,"f",0,"[Xe] 4f7 6s2",1.2,0,8,"El más reactivo de los metales de tierras raras. Bajo luz ultravioleta brilla en rojo o azul intenso, siendo crítico para los billetes europeos antifalsificación y pantallas LED.","The most reactive of the rare-earth metals. Under UV light, it glows intense red or blue, critical for anti-counterfeiting in Euro banknotes and LED screens."],
  [64,"Gd","Gadolinio","Gadolinium",157.25,8,"f",0,"[Xe] 4f7 5d1 6s2",1.2,0,8,"Posee propiedades magnéticas inusuales que cambian abruptamente con la temperatura (efecto magnetocalórico). Es el principal agente de contraste en imágenes de resonancia magnética (MRI).","Possesses unusual magnetic properties that change abruptly with temperature. It is the primary contrast agent used in Magnetic Resonance Imaging (MRI)."],
  [65,"Tb","Terbio","Terbium",158.93,8,"f",0,"[Xe] 4f9 6s2",1.2,0,8,"Lantánido maleable utilizado como componente vital en fósforos verdes. En combinación con el europio, produce la nítida retroiluminación brillante en pantallas de televisores y móviles.","Malleable lanthanide used as a vital component in green phosphors. Combined with europium, it produces sharp, bright backlighting in TVs and smartphones."],
  [66,"Dy","Disprosio","Dysprosium",162.50,8,"f",0,"[Xe] 4f10 6s2",1.22,0,8,"Un elemento con una susceptibilidad magnética extremadamente alta. Se usa en varillas de control nuclear por su alta capacidad para absorber neutrones térmicos y en láseres.","An element with extremely high magnetic susceptibility. Used in nuclear control rods due to its high thermal neutron absorption cross-section, and in lasers."],
  [67,"Ho","Holmio","Holmium",164.93,8,"f",0,"[Xe] 4f11 6s2",1.23,0,8,"Posee la mayor fuerza magnética (momento magnético) de cualquier elemento en la tabla. Se usa para crear los campos magnéticos artificiales más fuertes y en equipos médicos láser.","Possesses the highest magnetic strength (magnetic moment) of any element on the table. Used to create the strongest artificial magnetic fields and in medical lasers."],
  [68,"Er","Erbio","Erbium",167.26,8,"f",0,"[Xe] 4f12 6s2",1.24,0,8,"Metal de tierras raras cuyos iones tienen un color rosa fluorescente brillante. Cuando se introduce en cables de fibra óptica, amplifica las señales láser para la comunicación global de internet.","Rare-earth metal whose ions possess a bright fluorescent pink color. Doped into fiber-optic cables, it amplifies laser signals driving global internet communication."],
  [69,"Tm","Tulio","Thulium",168.93,8,"f",0,"[Xe] 4f13 6s2",1.25,0,8,"El segundo lantánido más raro. A pesar de su escasez y coste, el tulio radiactivo se emplea como fuente de radiación compacta en dispositivos médicos portátiles de rayos X.","The second rarest lanthanide. Despite its scarcity and cost, radioactive thulium is employed as a compact radiation source in portable medical X-ray devices."],
  [70,"Yb","Iterbio","Ytterbium",173.05,8,"f",0,"[Xe] 4f14 6s2",1.1,0,8,"Un lantánido suave y plateado. Se utiliza cada vez más en memorias de computadoras cuánticas, láseres de fibra industrial para el corte de metales y en la construcción de relojes atómicos ultrapcisos.","A soft, silvery lanthanide. Increasingly used in quantum memory computing, industrial fiber lasers for metal cutting, and building ultra-precise atomic clocks."],
  [71,"Lu","Lutecio","Lutetium",174.97,8,"d",0,"[Xe] 4f14 5d1 6s2",1.27,3,6,"Es el lantánido más denso, duro y costoso debido a su extrema rareza en minerales. Sus isótopos se emplean en medicina nuclear avanzada para detectar y tratar tumores específicos.","The densest, hardest, and most expensive lanthanide due to extreme rarity in ores. Its isotopes are used in advanced nuclear medicine to detect and treat specific tumors."],
  [72,"Hf","Hafnio","Hafnium",178.49,2,"d",0,"[Xe] 4f14 5d2 6s2",1.3,4,6,"Metal plateado brillante, química y visualmente idéntico al circonio. Es un extraordinario absorbente de neutrones, lo que lo hace ideal para regular reactores nucleares de submarinos.","Shiny silvery metal, chemically and visually identical to zirconium. An extraordinary neutron absorber, making it ideal for regulating submarine nuclear reactors."],
  [73,"Ta","Tántalo","Tantalum",180.95,2,"d",0,"[Xe] 4f14 5d3 6s2",1.5,5,6,"Metal denso e increíblemente resistente a la corrosión y fluidos corporales. Esto lo hace indispensable para implantes quirúrgicos humanos y microcapacitores de alta gama en electrónica.","Dense metal, incredibly resistant to corrosion and bodily fluids. This makes it indispensable for human surgical implants and high-end microcapacitors in electronics."],
  [74,"W","Wolframio","Tungsten",183.84,2,"d",0,"[Xe] 4f14 5d4 6s2",2.36,6,6,"Conocido en inglés como Tungsteno, tiene el punto de fusión más alto de todos los elementos metálicos. Famoso como el filamento de las históricas bombillas incandescentes y tubos de rayos X.","Has the highest melting point of all metallic elements. Famous as the glowing filament in historical incandescent light bulbs and X-ray tubes."],
  [75,"Re","Renio","Rhenium",186.21,2,"d",0,"[Xe] 4f14 5d5 6s2",1.9,7,6,"Uno de los elementos más densos y el último elemento estable en ser descubierto. Aleado a base de níquel, permite que las turbinas de aviones a reacción funcionen a temperaturas críticas.","One of the densest elements and the last stable element to be discovered. Nickel-based alloys with rhenium allow jet aircraft turbines to operate at critical temperatures."],
  [76,"Os","Osmio","Osmium",190.23,2,"d",0,"[Xe] 4f14 5d6 6s2",2.2,8,6,"Es el elemento natural más denso que existe en el universo conocido. Su óxido es altamente tóxico, pero su dureza permite usar aleaciones de osmio en plumillas de bolígrafos finos.","The densest naturally occurring element in the known universe. Its oxide is highly toxic, but its hardness allows osmium alloys in fine fountain pen nibs."],
  [77,"Ir","Iridio","Iridium",192.22,2,"d",0,"[Xe] 4f14 5d7 6s2",2.2,9,6,"El metal conocido más resistente a la corrosión. Una capa anómala de iridio en la Tierra respalda la teoría de que el impacto de un asteroide gigante provocó la extinción de los dinosaurios.","The most corrosion-resistant metal known. An anomalous global iridium layer supports the theory that a giant asteroid impact caused dinosaur extinction."],

// --- NUCLEUS BUILDER: protons (red) + neutrons (blue-grey) packed in a cluster ---
function buildNucleus(THREE, element) {
  const neutrons = Math.max(0, Math.round(element.mass) - element.z);
  const totalA   = element.z + neutrons;
  const maxVis   = Math.min(totalA, 80);

  // Scale nuclear radius like r ∝ A^(1/3)
  const nucR     = 0.55 + 0.28 * Math.cbrt(totalA);
  const nucleonR = Math.max(0.14, nucR / (Math.cbrt(maxVis) * 1.55));

  const group      = new THREE.Group();
  const protonMat  = new THREE.MeshBasicMaterial({ color: 0xff3355 });  // red-pink
  const neutronMat = new THREE.MeshBasicMaterial({ color: 0x4488cc });  // steel-blue
  const nucleonGeo = new THREE.SphereGeometry(nucleonR, 10, 10);

  const visP = Math.round(maxVis * element.z / totalA);
  const visN = maxVis - visP;

  // Pack nucleons via random-sequential jitter inside the nuclear sphere
  const placed = [];
  for (let attempt = 0; attempt < maxVis * 80 && placed.length < maxVis; attempt++) {
    const r     = nucR * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const px    = r * Math.sin(phi) * Math.cos(theta);
    const py    = r * Math.sin(phi) * Math.sin(theta);
    const pz    = r * Math.cos(phi);
    let ok = true;
    for (const q of placed) {
      const dx = px-q[0], dy = py-q[1], dz = pz-q[2];
      if (Math.sqrt(dx*dx + dy*dy + dz*dz) < nucleonR * 1.85) { ok = false; break; }
    }
    if (ok) placed.push([px, py, pz]);
  }

  placed.forEach((pos, i) => {
    const mesh = new THREE.Mesh(nucleonGeo, i < visP ? protonMat : neutronMat);
    mesh.position.set(pos[0], pos[1], pos[2]);
    group.add(mesh);
  });

  return group;
}

const loadThreeJS = () => {
  return new Promise((resolve, reject) => {
    if (window.THREE) return resolve(window.THREE);
    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
    script.onload = () => resolve(window.THREE);
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

const CORE_CONFIGS = {
  He: '1s2',
  Ne: '1s2 2s2 2p6',
  Ar: '1s2 2s2 2p6 3s2 3p6',
  Kr: '1s2 2s2 2p6 3s2 3p6 4s2 3d10 4p6',
  Xe: '1s2 2s2 2p6 3s2 3p6 4s2 3d10 4p6 5s2 4d10 5p6',
  Rn: '1s2 2s2 2p6 3s2 3p6 4s2 3d10 4p6 5s2 4d10 5p6 6s2 4f14 5d10 6p6'
};

const ORBITAL_L = { s: 0, p: 1, d: 2, f: 3 };

function expandedConfig(config) {
  return (config || '').replace(/\[([A-Za-z]+)\]/g, (_, core) => CORE_CONFIGS[core] || '');
}

function parseOrbitals(config) {
  const clean = expandedConfig(config);
  const tokens = [...clean.matchAll(/(\d)([spdf])(\d+)/g)];
  return tokens.map((m) => ({
    n: Number(m[1]),
    subshell: m[2],
    electrons: Number(m[3]),
    l: ORBITAL_L[m[2]] ?? 0
  }));
}

function gaussianRandom() {
  let u = 0;
  let v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function buildQuantumProfile(element) {
  const orbitals = parseOrbitals(element.config);

  if (!orbitals.length) {
    return [{ n: Math.max(1, element.period), l: 0, electrons: Math.max(1, element.z),
      scale: 1.8 + element.period * 1.35, radialSpread: 0.5 + element.period * 0.08,
      anisotropy: 0.2, weight: Math.max(1, element.z), fixedAxis: -1 }];
  }

  const result = [];
  for (const orb of orbitals) {
    const base = {
      n: orb.n, l: orb.l, subshell: orb.subshell, electrons: orb.electrons,
      scale: 1.8 + orb.n * 1.35 + orb.l * 0.75,
      radialSpread: 0.35 + orb.n * 0.16 + orb.l * 0.08
    };
    if (orb.l === 0) {
      result.push({ ...base, anisotropy: 0.2, weight: Math.max(1, orb.electrons), fixedAxis: -1 });
    } else if (orb.l === 1) {
      // px, py, pz — each axis gets its share of electrons
      for (let ax = 0; ax < 3; ax++) {
        const w = Math.max(0.3, orb.electrons / 3);
        result.push({ ...base, anisotropy: 0.9, weight: w, fixedAxis: ax });
      }
    } else if (orb.l === 2) {
      // 5 d-orbital types: dxy(0), dyz(1), dxz(2), dz2(3), dx2y2(4)
      for (let dt = 0; dt < 5; dt++) {
        const w = Math.max(0.2, orb.electrons / 5);
        result.push({ ...base, anisotropy: 1.35, weight: w, fixedAxis: dt, dType: dt });
      }
    } else {
      // 7 f sub-orbitals
      for (let ax = 0; ax < 7; ax++) {
        const w = Math.max(0.2, orb.electrons / 7);
        result.push({ ...base, anisotropy: 1.7, weight: w, fixedAxis: ax });
      }
    }
  }
  return result.filter(o => o.weight > 0);
}

function sampleOrbitalPoint(orbital) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const radialCore = Math.abs(gaussianRandom()) * orbital.radialSpread + (0.3 + Math.random() * 0.5);
  const r = orbital.scale * radialCore;

  let x = r * Math.sin(phi) * Math.cos(theta);
  let y = r * Math.sin(phi) * Math.sin(theta);
  let z = r * Math.cos(phi);

  if (orbital.l === 1) {
    // Explicit p_x / p_y / p_z lobing along the assigned axis
    const ax = orbital.fixedAxis >= 0 ? orbital.fixedAxis : Math.floor(Math.random() * 3);
    const axes = [x, y, z];
    axes[ax] *= 2.2 + Math.random() * 0.4;
    axes[(ax + 1) % 3] *= 0.40 + Math.random() * 0.15;
    axes[(ax + 2) % 3] *= 0.40 + Math.random() * 0.15;
    [x, y, z] = axes;
  } else if (orbital.l === 2) {
    const dt = orbital.dType ?? 0;
    if (dt < 3) {
      // dxy(0)→xy-plane, dyz(1)→yz-plane, dxz(2)→xz-plane — four-lobed cloverleaf
      const planeA = dt === 0 ? 0 : (dt === 1 ? 1 : 0);
      const planeB = dt === 0 ? 1 : (dt === 1 ? 2 : 2);
      const perp   = dt === 0 ? 2 : (dt === 1 ? 0 : 1);
      const axes = [x, y, z];
      axes[perp]  *= 0.30;
      axes[planeA] *= 1.70 + Math.random() * 0.30;
      axes[planeB] *= 1.70 + Math.random() * 0.30;
      [x, y, z] = axes;
    } else if (dt === 3) {
      // dz2 — two lobes along z + equatorial torus
      z *= 2.2 + Math.random() * 0.3;
      x *= 0.42;
      y *= 0.42;
    } else {
      // dx2-y2 — lobes along +x,-x,+y,-y axes
      const flip = Math.random() < 0.5;
      x *= flip ? 2.1 : 0.35;
      y *= flip ? 0.35 : 2.1;
      z *= 0.38;
    }
  } else if (orbital.l >= 3) {
    // f sub-orbitals: cycle through 3 principal axes with clover shaping
    const ax = orbital.fixedAxis % 3;
    const axes = [x, y, z];
    axes[ax] *= 2.3 + Math.random() * 0.4;
    axes[(ax + 1) % 3] *= 0.50 + Math.random() * 0.30;
    axes[(ax + 2) % 3] *= 0.32 + Math.random() * 0.22;
    // Extra lobing twist for higher-index f orbitals
    if (orbital.fixedAxis >= 3) {
      axes[(ax + 1) % 3] *= 1.5 + Math.random() * 0.4;
      axes[ax] *= 0.8;
    }
    [x, y, z] = axes;
  }

  return [x, y, z];
}

// 3D SIMULATION COMPONENT
const Simulation3D = ({ element, modelType, langStr }) => {
  const mountRef = useRef(null);
  const [loading, setLoading] = useState(true);
  const t = DICT[langStr];

  useEffect(() => {
    let scene, camera, renderer, animationId;
    let particles = [];
    let core, orbits = [];

    const init = async () => {
      setLoading(true);
      const THREE = await loadThreeJS();
      setLoading(false);

      if (!mountRef.current) return;
      mountRef.current.innerHTML = ''; 

      const width = mountRef.current.clientWidth;
      const height = mountRef.current.clientHeight;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.z = 25;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(window.devicePixelRatio);
      mountRef.current.appendChild(renderer.domElement);

      const color = CAT_COLORS[element.category] || "#ffffff";

      // NUCLEUS — cluster of protons (red) and neutrons (blue)
      core = buildNucleus(THREE, element);
      scene.add(core);

      if (modelType === 'bohr') {
        // Bohr Model
        const maxShells = Math.min(element.period, 7); 
        const electrons = Math.min(element.z, 118); 

        for (let i = 1; i <= maxShells; i++) {
          const radius = i * 3.5;
          const orbitGeo = new THREE.RingGeometry(radius - 0.05, radius + 0.05, 64);
          const orbitMat = new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
          const orbit = new THREE.Mesh(orbitGeo, orbitMat);
          orbit.rotation.x = Math.PI / 2;
          orbits.push(orbit);
          scene.add(orbit);

          const maxElectronsInShell = 2 * (i * i);
          const eInThisShell = Math.min(electrons - particles.length, maxElectronsInShell);
          if (eInThisShell > 0) {
            for (let j = 0; j < eInThisShell; j++) {
              const eGeo = new THREE.SphereGeometry(0.3, 16, 16);
              const eMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
              const electron = new THREE.Mesh(eGeo, eMat);
              const angle = (j / eInThisShell) * Math.PI * 2;
              electron.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
              
              const eObj = new THREE.Group();
              eObj.add(electron);
              eObj.rotation.x = (Math.random() - 0.5) * 0.5;
              eObj.rotation.z = (Math.random() - 0.5) * 0.5;
              
              eObj.userData = { speed: (0.02 + Math.random() * 0.02) * (i % 2 === 0 ? 1 : -1) };
              particles.push(eObj);
              scene.add(eObj);
            }
          }
        }
      } else {
        // Quantum Model
        const pGeo = new THREE.BufferGeometry();
        const pCount = Math.min(Math.max(2600, element.z * 140 + element.period * 220), 14000);
        const pArr = new Float32Array(pCount * 3);
        const pColors = new Float32Array(pCount * 3);
        const baseColor = new THREE.Color(color);

        const profile = buildQuantumProfile(element);
        const totalWeight = profile.reduce((acc, o) => acc + o.weight, 0);
        const maxWeight = Math.max(1, ...profile.map((o) => o.weight));

        for (let i = 0; i < pCount * 3; i += 3) {
          let pick = Math.random() * totalWeight;
          let selected = profile[0];
          for (const orbital of profile) {
            pick -= orbital.weight;
            if (pick <= 0) {
              selected = orbital;
              break;
            }
          }

          const point = sampleOrbitalPoint(selected);
          const x = point[0];
          const y = point[1];
          const z = point[2];

          pArr[i] = x;
          pArr[i + 1] = y;
          pArr[i + 2] = z;

          const dist = Math.sqrt(x * x + y * y + z * z);
          const sigma = selected.scale * (1.15 + selected.l * 0.25);
          const probDensity = Math.exp(-Math.pow(dist / Math.max(0.001, sigma), 2));
          const occupancyFactor = 0.55 + 0.45 * (selected.weight / maxWeight);
          const localDensity = Math.max(0, Math.min(1, probDensity * occupancyFactor));
          const contrast = Math.pow(localDensity, 0.58);
          const lightness = 0.18 + contrast * 1.55;

          pColors[i] = Math.min(1, baseColor.r * lightness);
          pColors[i + 1] = Math.min(1, baseColor.g * lightness);
          pColors[i + 2] = Math.min(1, baseColor.b * lightness);
        }

        pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
        const pMat = new THREE.PointsMaterial({
          size: 0.11,
          sizeAttenuation: true,
          vertexColors: true,
          transparent: true,
          opacity: 0.68,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const cloud = new THREE.Points(pGeo, pMat);
        particles.push(cloud);
        scene.add(cloud);
      }

      // Interact - Drag to rotate & Scroll to zoom
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };
      
      const onMouseDown = () => { isDragging = true; };
      const onMouseUp = () => { isDragging = false; };
      const onMouseMove = (e) => {
        if (isDragging) {
          const deltaMove = { x: e.movementX, y: e.movementY };
          scene.rotation.y += deltaMove.x * 0.01;
          scene.rotation.x += deltaMove.y * 0.01;
        }
      };

      const onWheel = (e) => {
        e.preventDefault();
        camera.position.z += e.deltaY * 0.05;
        // Clamp Zoom
        camera.position.z = Math.max(8, Math.min(camera.position.z, 60));
      };

      const domElement = renderer.domElement;
      domElement.addEventListener('mousedown', onMouseDown);
      window.addEventListener('mouseup', onMouseUp);
      domElement.addEventListener('mousemove', onMouseMove);
      domElement.addEventListener('wheel', onWheel, { passive: false });

      // Resize
      const handleResize = () => {
        if (!mountRef.current) return;
        const w = mountRef.current.clientWidth;
        const h = mountRef.current.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      };
      window.addEventListener('resize', handleResize);

      // Animation loop
      const animate = () => {
        animationId = requestAnimationFrame(animate);
        
        if (core) {
           core.scale.setScalar(1 + Math.sin(Date.now() * 0.01) * 0.02);
        }

        if (modelType === 'bohr') {
          particles.forEach(p => p.rotation.y += p.userData.speed);
          orbits.forEach(o => o.rotation.z += 0.001);
        } else {
          particles.forEach(p => {
             p.rotation.y += 0.005;
             p.rotation.x += 0.002;
          });
        }
        
        renderer.render(scene, camera);
      };

      animate();

      return () => {
        cancelAnimationFrame(animationId);
        window.removeEventListener('resize', handleResize);
        window.removeEventListener('mouseup', onMouseUp);
        domElement.removeEventListener('wheel', onWheel);
        if (mountRef.current && domElement) {
          mountRef.current.removeChild(domElement);
        }
      };
    };

    const cleanup = init();
    return () => { cleanup.then(f => f && f()); };
  }, [element, modelType]);

  return (
    <div className="relative w-full h-full bg-gradient-to-br from-[#0f1522] to-[#1a2235] flex items-center justify-center overflow-hidden">
      {loading && <div className="text-cyan-500 animate-pulse font-mono tracking-widest">Inicializando Motor 3D...</div>}
      
      <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing" title={t.zoomTip} />
      
      {/* HUD: Interaction Tip */}
      <div className="absolute top-4 left-4 flex gap-2 items-center text-gray-400 bg-gray-900/60 px-3 py-1.5 rounded backdrop-blur-sm border border-gray-700 pointer-events-none">
        <ZoomIn className="w-4 h-4" />
        <span className="text-xs font-mono">{t.zoomTip}</span>
      </div>

      {/* HUD: Conventions Legend */}
      <div className="absolute bottom-4 left-4 bg-gray-900/80 p-3 rounded-lg backdrop-blur-md border border-gray-700 pointer-events-none text-xs">
        <h4 className="font-bold text-gray-300 mb-2 border-b border-gray-700 pb-1 uppercase tracking-wider">{t.legend}</h4>
        <div className="flex flex-col gap-1.5 text-gray-400">
           <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#ff3355]"></div> {t.legendProtons}</div>
           <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#4488cc]"></div> {t.legendNeutrons}</div>
           {modelType === 'bohr' ? (
             <>
               <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-white"></div> {t.legendElectrons}</div>
               <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full border border-gray-500"></div> {t.legendOrbits}</div>
             </>
           ) : (
             <>
               <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-white"></div> {t.legendCloudPoints}</div>
               <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full opacity-60" style={{backgroundColor: CAT_COLORS[element.category]}}></div> {t.legendClouds}</div>
             </>
           )}
        </div>
      </div>
    </div>
  );
};

                  const opacity = isMatch ? 'opacity-100' : 'opacity-20';
                  const color = CAT_COLORS[el.category];
                  
                  // Proper Grid Coordinate Logic
                  let r = el.period;
                  let c = el.group;
                  
                  // For F-block elements, we calculate their positions manually below the main table
                  if (el.z >= 57 && el.z <= 71) {
                     r = 9; // Lanthanides row
                     c = el.z - 57 + 4; // Starts at column 4
                  } else if (el.z >= 89 && el.z <= 103) {
                     r = 10; // Actinides row
                     c = el.z - 89 + 4; // Starts at column 4
                  } else {
                     // Failsafe for missing group in main body (shouldn't happen with updated logic)
                     if (!c || c < 1) c = 1; 
                  }

                  return (
                    <div 
                      key={el.z}
                      onClick={() => handleElementClick(el)}
                      style={{ 
                        gridColumn: c, gridRow: r, 
                        backgroundColor: `${color}15`, 
                        borderColor: `${color}50` 
                      }}
                      className={`relative flex flex-col items-center justify-center p-1 border rounded-sm hover:scale-110 hover:z-10 transition-all cursor-pointer shadow-sm group ${opacity}`}
                    >
                      <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity rounded-sm" style={{ boxShadow: `0 0 10px ${color}` }}></div>
                      
                      <span className="absolute top-0.5 left-1 text-[8px] md:text-[10px] text-gray-400 z-10">{el.z}</span>
                      <span className="absolute top-0.5 right-1 text-[7px] text-gray-600 opacity-0 group-hover:opacity-100 z-10 font-bold">{el.block}</span>
                      
                      <span className="text-sm md:text-lg font-bold font-exo mt-2 mb-0.5 z-10" style={{ color: color }}>
                        {el.symbol}
                      </span>
                      
                      {!studyMode && (
                        <span className="text-[7px] md:text-[8px] whitespace-nowrap overflow-hidden text-ellipsis w-full text-center text-gray-300 z-10">
                          {lang === 'es' ? el.nameEs : el.nameEn}
                        </span>
                      )}
                      <span className="text-[6px] md:text-[7px] text-gray-500 font-mono hidden md:block z-10">
                        {el.mass.toFixed(2)}
                      </span>
                    </div>
                  );
                })}

                {/* Main Table Placeholders for F-Block */}
                <div style={{ gridColumn: 3, gridRow: 6 }} className="flex flex-col items-center justify-center border border-pink-500/30 bg-pink-500/10 rounded-sm">
                  <span className="text-[10px] text-pink-500">57-71</span><span className="text-[8px] text-pink-400/50">La-Lu</span>
                </div>
                <div style={{ gridColumn: 3, gridRow: 7 }} className="flex flex-col items-center justify-center border border-rose-500/30 bg-rose-500/10 rounded-sm">
                   <span className="text-[10px] text-rose-500">89-103</span><span className="text-[8px] text-rose-400/50">Ac-Lr</span>
                </div>

              </div>
            </div>
          </div>
        )}
      </main>

      {/* FULLSCREEN MODAL (DETAILS & SIMULATION) */}
      <div 
        className={`fixed inset-0 bg-[#0a0e17]/98 backdrop-blur-2xl z-50 flex flex-col transition-all duration-300 ease-in-out
          ${selectedElement ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8 pointer-events-none'} 
        `}
      >
        {selectedElement && (
          <div className="flex flex-col h-full w-full max-w-[1600px] mx-auto">
            {/* Modal Header */}
            <div className="flex items-center justify-between p-4 md:px-8 border-b border-gray-800 shrink-0" style={{ borderTop: `4px solid ${CAT_COLORS[selectedElement.category]}` }}>
              <button 
                onClick={closeModal} 
                className="flex items-center gap-2 px-4 py-2 hover:bg-gray-800 rounded-full text-gray-400 hover:text-white transition-colors"
              >
                <ArrowLeft className="w-5 h-5" /> <span className="font-bold hidden md:inline">{t.backToTable}</span>
              </button>
              
              <div className="flex items-center gap-4 absolute left-1/2 -translate-x-1/2">
                <div className="w-12 h-12 md:w-16 md:h-16 rounded flex flex-col items-center justify-center bg-[#111827] border border-gray-700 shadow-inner">
                  <span className="text-[10px] md:text-xs text-gray-400 -mb-1">{selectedElement.z}</span>
                  <span className="text-xl md:text-2xl font-bold font-exo" style={{ color: CAT_COLORS[selectedElement.category] }}>{selectedElement.symbol}</span>
                </div>
                <div className="flex flex-col items-center md:items-start">
                  <h2 className="text-xl md:text-3xl font-bold tracking-wide">{lang === 'es' ? selectedElement.nameEs : selectedElement.nameEn}</h2>
                  <p className="text-xs md:text-sm text-gray-400">{t.categories[selectedElement.category]}</p>
                </div>
              </div>
            </div>

            {/* Modal Body: Split Screen */}
            <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
              
              {/* Left Side: 3D Simulation */}
              <div className="relative w-full lg:w-3/5 h-[40vh] lg:h-full border-b lg:border-b-0 lg:border-r border-gray-800 flex shrink-0">
                <div className="absolute top-4 right-4 z-10 flex gap-2 bg-gray-900/90 p-1.5 rounded-lg backdrop-blur-md border border-gray-700 shadow-xl">
                   <button 
                     onClick={() => setModelType('bohr')}
                     className={`text-xs md:text-sm px-3 py-1.5 rounded transition-all ${modelType === 'bohr' ? 'bg-cyan-500 text-[#0a0e17] font-bold shadow-md' : 'text-gray-400 hover:text-white'}`}
                   >
                     {t.bohrModel}
                   </button>
                   <button 
                     onClick={() => setModelType('quantum')}
                     className={`text-xs md:text-sm px-3 py-1.5 rounded transition-all ${modelType === 'quantum' ? 'bg-cyan-500 text-[#0a0e17] font-bold shadow-md' : 'text-gray-400 hover:text-white'}`}
                   >
                     {t.quantumModel}
                   </button>
                </div>
                <Simulation3D element={selectedElement} modelType={modelType} langStr={lang} />
              </div>

              {/* Right Side: Information Panel */}
              <div className="w-full lg:w-2/5 h-full overflow-y-auto custom-scrollbar p-6 lg:p-10 bg-[#111827]">
                
                {/* Description Box */}
                <div className="mb-8">
                  <h3 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <Info className="w-4 h-4 text-cyan-500" /> {t.descriptionTitle}
                  </h3>
                  <p className="text-gray-200 leading-relaxed font-nunito text-lg">
                    {lang === 'es' ? selectedElement.descEs : selectedElement.descEn}
                  </p>
                </div>

                {/* Data Grid */}
                <div className="grid grid-cols-2 gap-4 lg:gap-6">
                  <DataBox label={t.mass} value={selectedElement.mass.toFixed(4)} unit="u" />
                  <DataBox label={t.config} value={selectedElement.config} font="font-mono text-cyan-400" />
                  <DataBox label={t.electronegativity} value={selectedElement.electronegativity || t.noData} />
                  <DataBox label={t.state} value={
                    selectedElement.state === 0 ? t.solid : 
                    selectedElement.state === 1 ? t.liquid : 
                    selectedElement.state === 2 ? t.gas : t.unknown
                  } />
                  <DataBox label={t.block} value={`Bloque ${selectedElement.block.toUpperCase()}`} />
                  <DataBox label={t.groupPeriod} value={`${selectedElement.group || '-'} / ${selectedElement.period}`} />
                </div>
              </div>

            </div>
          </div>
        )}
      </div>

      {/* FOOTER */}
      <footer className="bg-[#0f1522] border-t border-gray-800 py-6 text-center text-sm text-gray-500 mt-auto shrink-0 z-30 relative">
        <div className="flex flex-col md:flex-row items-center justify-center gap-2 md:gap-6">
          <p>{t.developedBy}</p>
          <a href="http://juantomoo.github.io/" target="_blank" rel="noopener noreferrer" className="text-cyan-500 hover:text-cyan-400 transition-colors flex items-center gap-1">
            <Globe className="w-4 h-4" /> juantomoo.github.io
          </a>
          <p>{t.license}</p>
        </div>
      </footer>
    </div>
  );
}

// Helper Component for Data Boxes
function DataBox({ label, value, unit = "", font = "font-sans" }) {
  return (
    <div className="bg-[#1a1f2e] p-4 rounded-xl border border-gray-800/50 flex flex-col justify-center shadow-sm hover:border-cyan-500/30 transition-colors">
      <span className="text-[10px] md:text-xs uppercase tracking-wider text-gray-500 mb-1">{label}</span>
      <span className={`text-lg md:text-xl font-medium text-gray-100 ${font}`}>{value} <span className="text-sm text-gray-500">{unit}</span></span>
    </div>
  );
}

// Base CSS injected for scrollbar and fonts
const style = document.createElement('style');
style.innerHTML = `
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=JetBrains+Mono&family=Nunito:wght@400;600&family=Orbitron:wght@500;700&display=swap');

  body { margin: 0; }
  .font-orbitron { font-family: 'Orbitron', sans-serif; }
  .font-exo { font-family: 'Exo 2', sans-serif; }
  .font-nunito { font-family: 'Nunito', sans-serif; }
  
  .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4a5568; }
`;
document.head.appendChild(style);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
